# fly.toml app configuration file generated for go-zadan123-bot on 2026-05-02T01:05:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'go-zadan123-bot'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
